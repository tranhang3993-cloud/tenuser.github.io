<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster Basic</title>
  <meta name="description" content="Hệ thống quản lý dự án cá nhân - 1 file HTML, sẵn sàng đưa lên GitHub Pages, Netlify hoặc Vercel." />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.25);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select, input, textarea {
      font: inherit;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.18);
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: white;
      color: #374151;
      border-color: #d1d5db;
    }

    main { padding: 28px 0 40px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-card {
      padding: 20px 22px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      padding: 16px;
      margin-bottom: 22px;
    }

    .field, .select, .textarea {
      width: 100%;
      border: 1px solid #d6dae1;
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field:focus, .select:focus, .textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-todo { background: #9ca3af; }
    .dot-doing { background: #2563eb; }
    .dot-done { background: #10b981; }

    .count {
      background: #eef2f7;
      color: #475569;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task {
      padding: 16px;
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .priority-high { background: #fef2f2; color: #dc2626; }
    .priority-medium { background: #fffbeb; color: #d97706; }
    .priority-low { background: #ecfdf5; color: #059669; }
    .status-todo { background: #f3f4f6; color: #4b5563; }
    .status-doing { background: #eff6ff; color: #2563eb; }
    .status-done { background: #ecfdf5; color: #059669; }

    .task-title {
      margin: 0 0 8px;
      font-size: 21px;
      font-weight: 750;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .task-desc {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
      min-height: 44px;
      white-space: pre-wrap;
    }

    .task-footer {
      border-top: 1px solid #f1f5f9;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .task-date {
      font-size: 14px;
      color: #475569;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-mini {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .empty {
      background: #fff;
      border: 1px dashed #d6dae1;
      border-radius: var(--radius);
      padding: 26px 20px;
      text-align: center;
      color: #94a3b8;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.24);
      padding: 22px;
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .footer-note {
      margin-top: 18px;
      color: #64748b;
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 980px) {
      .stats, .board, .toolbar, .form-row {
        grid-template-columns: 1fr;
      }
      .stat-value { font-size: 34px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <div class="logo">TM</div>
        <div>
          <h1>TaskMaster Basic</h1>
          <p>Hệ thống quản lý dự án cá nhân — 1 file HTML độc lập</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="resetBtn" type="button">Reset mẫu</button>
        <button class="btn btn-primary" id="addBtn" type="button">+ Việc mới</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats">
      <article class="card stat-card">
        <div class="stat-label">Tổng số việc</div>
        <div class="stat-value" id="statTotal">0</div>
      </article>
      <article class="card stat-card">
        <div class="stat-label">Đang chờ</div>
        <div class="stat-value" id="statTodo">0</div>
      </article>
      <article class="card stat-card">
        <div class="stat-label">Đang làm</div>
        <div class="stat-value" id="statDoing">0</div>
      </article>
      <article class="card stat-card">
        <div class="stat-label">Hoàn thành</div>
        <div class="stat-value" id="statDone">0</div>
      </article>
    </section>

    <section class="card toolbar">
      <input class="field" id="searchInput" type="text" placeholder="Tìm theo tên việc hoặc mô tả..." />
      <select class="select" id="priorityFilter">
        <option value="all">Tất cả mức độ</option>
        <option value="high">Cao</option>
        <option value="medium">Trung bình</option>
        <option value="low">Thấp</option>
      </select>
    </section>

    <section class="board">
      <div>
        <div class="column-head">
          <div class="column-title"><span class="dot dot-todo"></span>Chờ xử lý</div>
          <span class="count" id="countTodo">0</span>
        </div>
        <div class="task-list" id="todoList"></div>
      </div>

      <div>
        <div class="column-head">
          <div class="column-title"><span class="dot dot-doing"></span>Đang làm</div>
          <span class="count" id="countDoing">0</span>
        </div>
        <div class="task-list" id="doingList"></div>
      </div>

      <div>
        <div class="column-head">
          <div class="column-title"><span class="dot dot-done"></span>Hoàn thành</div>
          <span class="count" id="countDone">0</span>
        </div>
        <div class="task-list" id="doneList"></div>
      </div>
    </section>

    <div class="footer-note">Dữ liệu đang lưu trên trình duyệt bằng localStorage.</div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">Tạo công việc mới</h2>
      <div class="form-grid">
        <input class="field" id="taskTitle" type="text" placeholder="Tên công việc" />
        <textarea class="textarea" id="taskDesc" rows="4" placeholder="Mô tả công việc"></textarea>
        <div class="form-row">
          <select class="select" id="taskPriority">
            <option value="high">Cao</option>
            <option value="medium" selected>Trung bình</option>
            <option value="low">Thấp</option>
          </select>
          <select class="select" id="taskStatus">
            <option value="todo">Chờ xử lý</option>
            <option value="doing">Đang làm</option>
            <option value="done">Hoàn thành</option>
          </select>
          <input class="field" id="taskDate" type="date" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn" type="button">Hủy</button>
        <button class="btn btn-primary" id="saveBtn" type="button">Lưu công việc</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'taskmaster-basic-site-v1';
    const seedTasks = [
      {
        id: 1,
        title: 'Họp phòng',
        description: 'Chuẩn bị nội dung họp tuần, cập nhật tiến độ và các đầu việc cần xử lý.',
        priority: 'high',
        status: 'todo',
        dueDate: '2026-03-10'
      },
      {
        id: 2,
        title: 'Cấp thẻ ra/vào công trường',
        description: 'Cấp phát thẻ chính thức, thẻ xe và thẻ tạm cho các đơn vị liên quan.',
        priority: 'medium',
        status: 'doing',
        dueDate: '2026-03-15'
      }
    ];

    let tasks = loadTasks();
    let editingId = null;

    const els = {
      searchInput: document.getElementById('searchInput'),
      priorityFilter: document.getElementById('priorityFilter'),
      todoList: document.getElementById('todoList'),
      doingList: document.getElementById('doingList'),
      doneList: document.getElementById('doneList'),
      statTotal: document.getElementById('statTotal'),
      statTodo: document.getElementById('statTodo'),
      statDoing: document.getElementById('statDoing'),
      statDone: document.getElementById('statDone'),
      countTodo: document.getElementById('countTodo'),
      countDoing: document.getElementById('countDoing'),
      countDone: document.getElementById('countDone'),
      modalBackdrop: document.getElementById('modalBackdrop'),
      modalTitle: document.getElementById('modalTitle'),
      taskTitle: document.getElementById('taskTitle'),
      taskDesc: document.getElementById('taskDesc'),
      taskPriority: document.getElementById('taskPriority'),
      taskStatus: document.getElementById('taskStatus'),
      taskDate: document.getElementById('taskDate'),
      addBtn: document.getElementById('addBtn'),
      saveBtn: document.getElementById('saveBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      resetBtn: document.getElementById('resetBtn')
    };

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [...seedTasks];
      } catch {
        return [...seedTasks];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function resetDemo() {
      tasks = [...seedTasks];
      saveTasks();
      render();
    }

    function formatDate(value) {
      if (!value) return 'Chưa có hạn';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString('vi-VN');
    }

    function priorityLabel(priority) {
      return priority === 'high' ? 'Cao' : priority === 'medium' ? 'Trung bình' : 'Thấp';
    }

    function statusLabel(status) {
      return status === 'todo' ? 'Chờ' : status === 'doing' ? 'Làm' : 'Xong';
    }

    function clearNode(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function createButton(text, className, handler) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `btn btn-secondary btn-mini ${className || ''}`.trim();
      button.textContent = text;
      button.addEventListener('click', handler);
      return button;
    }

    function createBadge(text, className) {
      const span = document.createElement('span');
      span.className = `badge ${className}`;
      span.textContent = text;
      return span;
    }

    function createTaskCard(task) {
      const card = document.createElement('article');
      card.className = 'card task';

      const top = document.createElement('div');
      top.className = 'task-top';

      const badgeRow = document.createElement('div');
      badgeRow.className = 'badge-row';
      badgeRow.appendChild(createBadge(priorityLabel(task.priority), `priority-${task.priority}`));
      badgeRow.appendChild(createBadge(statusLabel(task.status), `status-${task.status}`));

      const editBtn = createButton('Sửa', '', () => openModal(task));

      top.appendChild(badgeRow);
      top.appendChild(editBtn);

      const title = document.createElement('h3');
      title.className = 'task-title';
      title.textContent = task.title;

      const desc = document.createElement('p');
      desc.className = 'task-desc';
      desc.textContent = task.description || 'Không có mô tả.';

      const footer = document.createElement('div');
      footer.className = 'task-footer';

      const date = document.createElement('div');
      date.className = 'task-date';
      date.textContent = formatDate(task.dueDate);

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      if (task.status !== 'done') {
        actions.appendChild(createButton('Chuyển', '', () => moveTask(task.id)));
      }
      actions.appendChild(createButton('Xóa', '', () => deleteTask(task.id)));

      footer.appendChild(date);
      footer.appendChild(actions);

      card.appendChild(top);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(footer);

      return card;
    }

    function renderEmpty(target, text) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = text;
      target.appendChild(div);
    }

    function getFilteredTasks() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const priority = els.priorityFilter.value;

      return tasks.filter(task => {
        const title = (task.title || '').toLowerCase();
        const desc = (task.description || '').toLowerCase();
        const matchKeyword = !keyword || title.includes(keyword) || desc.includes(keyword);
        const matchPriority = priority === 'all' || task.priority === priority;
        return matchKeyword && matchPriority;
      });
    }

    function render() {
      const filtered = getFilteredTasks();
      const todoTasks = filtered.filter(task => task.status === 'todo');
      const doingTasks = filtered.filter(task => task.status === 'doing');
      const doneTasks = filtered.filter(task => task.status === 'done');

      clearNode(els.todoList);
      clearNode(els.doingList);
      clearNode(els.doneList);

      todoTasks.length ? todoTasks.forEach(task => els.todoList.appendChild(createTaskCard(task))) : renderEmpty(els.todoList, 'Chưa có công việc nào.');
      doingTasks.length ? doingTasks.forEach(task => els.doingList.appendChild(createTaskCard(task))) : renderEmpty(els.doingList, 'Không có việc đang làm.');
      doneTasks.length ? doneTasks.forEach(task => els.doneList.appendChild(createTaskCard(task))) : renderEmpty(els.doneList, 'Chưa có việc hoàn thành.');

      els.countTodo.textContent = String(todoTasks.length);
      els.countDoing.textContent = String(doingTasks.length);
      els.countDone.textContent = String(doneTasks.length);

      els.statTotal.textContent = String(tasks.length);
      els.statTodo.textContent = String(tasks.filter(task => task.status === 'todo').length);
      els.statDoing.textContent = String(tasks.filter(task => task.status === 'doing').length);
      els.statDone.textContent = String(tasks.filter(task => task.status === 'done').length);
    }

    function openModal(task) {
      els.modalBackdrop.classList.add('show');
      els.modalBackdrop.setAttribute('aria-hidden', 'false');

      if (task) {
        editingId = task.id;
        els.modalTitle.textContent = 'Chỉnh sửa công việc';
        els.taskTitle.value = task.title || '';
        els.taskDesc.value = task.description || '';
        els.taskPriority.value = task.priority || 'medium';
        els.taskStatus.value = task.status || 'todo';
        els.taskDate.value = task.dueDate || '';
      } else {
        editingId = null;
        els.modalTitle.textContent = 'Tạo công việc mới';
        els.taskTitle.value = '';
        els.taskDesc.value = '';
        els.taskPriority.value = 'medium';
        els.taskStatus.value = 'todo';
        els.taskDate.value = '';
      }

      setTimeout(() => els.taskTitle.focus(), 10);
    }

    function closeModal() {
      els.modalBackdrop.classList.remove('show');
      els.modalBackdrop.setAttribute('aria-hidden', 'true');
    }

    function saveTask() {
      const title = els.taskTitle.value.trim();
      const description = els.taskDesc.value.trim();
      const priority = els.taskPriority.value;
      const status = els.taskStatus.value;
      const dueDate = els.taskDate.value;

      if (!title) {
        els.taskTitle.focus();
        return;
      }

      const nextTask = {
        id: editingId || Date.now(),
        title,
        description,
        priority,
        status,
        dueDate
      };

      if (editingId) {
        tasks = tasks.map(task => task.id === editingId ? nextTask : task);
      } else {
        tasks.unshift(nextTask);
      }

      saveTasks();
      closeModal();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      render();
    }

    function moveTask(id) {
      tasks = tasks.map(task => {
        if (task.id !== id) return task;
        if (task.status === 'todo') return { ...task, status: 'doing' };
        if (task.status === 'doing') return { ...task, status: 'done' };
        return task;
      });
      saveTasks();
      render();
    }

    els.addBtn.addEventListener('click', () => openModal());
    els.saveBtn.addEventListener('click', saveTask);
    els.cancelBtn.addEventListener('click', closeModal);
    els.resetBtn.addEventListener('click', resetDemo);
    els.searchInput.addEventListener('input', render);
    els.priorityFilter.addEventListener('change', render);
    els.modalBackdrop.addEventListener('click', (event) => {
      if (event.target === els.modalBackdrop) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && els.modalBackdrop.classList.contains('show')) closeModal();
    });

    render();
  </script>
</body>
</html>
